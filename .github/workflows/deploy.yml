name: Deploy Angular site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: abbi-ng-ai-image-descriptor/package-lock.json

      - name: Install dependencies
        working-directory: abbi-ng-ai-image-descriptor
        run: npm ci

      - name: Build Angular app
        working-directory: abbi-ng-ai-image-descriptor
        run: npm run build -- --base-href=/website-demo/

      - name: Show build output
        working-directory: abbi-ng-ai-image-descriptor
        run: |
          pwd
          find dist -maxdepth 3 -type f | head -50
          find dist -name index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: abbi-ng-ai-image-descriptor/dist/browser

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
